[workspace]
name = "tsukumogami"
content_dir = "claude"

[[sources]]
org = "tsukumogami"

[groups.public]
visibility = "public"

# --- Claude ---

[claude]
marketplaces = ["tsukumogami/shirabe"]
plugins = ["shirabe@shirabe"]

[[claude.hooks.pre_tool_use]]
matcher = "Bash"
scripts = ["hooks/pre_tool_use/gate-online.sh"]

[[claude.hooks.stop]]
scripts = ["hooks/stop/workflow-continue.sh"]

[claude.settings]
permissions = "bypass"

[claude.env]
promote = ["GH_TOKEN"]

# --- Environment ---

[env]
files = ["env/workspace.env"]

# Declare what secrets this workspace needs without specifying vault addresses.
# The overlay provides [vault.provider] and resolves these via vault://.
[env.secrets.required]
ANTHROPIC_API_KEY  = "Anthropic API key for Claude — resolved by overlay vault"
GH_TOKEN           = "GitHub PAT with repo scope — supplied via personal overlay"

[env.secrets.recommended]
TAVILY_API_KEY     = "Tavily search API key — resolved by overlay vault"
BRAVE_API_KEY      = "Brave search API key — resolved by overlay vault"

[env.secrets.optional]
TELEGRAM_BOT_TOKEN = "Telegram bot token for workflow notifications — resolved by overlay vault"

[repos.niwa.env.secrets.required]
INFISICAL_TEST_PROJECT_ID = "Infisical test project ID — resolved by overlay vault"
INFISICAL_CLIENT_ID       = "Infisical machine identity client ID — resolved by overlay vault"
INFISICAL_CLIENT_SECRET   = "Infisical machine identity client secret — resolved by overlay vault"

# --- Files ---

[files]
"extensions/design.md" = ".claude/shirabe-extensions/"
"extensions/explore.md" = ".claude/shirabe-extensions/"
"extensions/plan.md" = ".claude/shirabe-extensions/"
"extensions/prd.md" = ".claude/shirabe-extensions/"
"extensions/work-on.md" = ".claude/shirabe-extensions/"

# --- Content ---

[claude.content.workspace]
source = "workspace.md"

[claude.content.groups.public]
source = "public.md"

[claude.content.repos.tsuku]
source = "repos/tsuku.md"

  [claude.content.repos.tsuku.subdirs]
  recipes = "repos/tsuku-subdirs/recipes.md"
  telemetry = "repos/tsuku-subdirs/telemetry.md"
  website = "repos/tsuku-subdirs/website.md"

[claude.content.repos.koto]
source = "repos/koto.md"
